<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 반 아침 알리미</title>
    <!-- React 및 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
        :root { --font-main: 'Pretendard', sans-serif; }
        body { font-family: var(--font-main); letter-spacing: -0.02em; background-color: #FFF5F7; }
        .select-none { user-select: none; -webkit-user-select: none; }
        /* 스크롤바 숨기기 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 안정적인 아이콘 컴포넌트 (SVG 직접 정의)
        const Icon = ({ name, className = "" }) => {
            const icons = {
                calendar: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                ),
                save: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                ),
                'edit-3': (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                ),
                lock: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                ),
                sparkles: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"></path>
                        <path d="M5 3v4"></path>
                        <path d="M19 17v4"></path>
                        <path d="M3 5h4"></path>
                        <path d="M17 19h4"></path>
                    </svg>
                ),
                'check-circle-2': (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path>
                        <path d="m9 12 2 2 4-4"></path>
                    </svg>
                ),
                heart: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none" className={className}>
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                ),
                plus: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                ),
                trash: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                )
            };
            return icons[name] || null;
        };

        const App = () => {
            const [isEditing, setIsEditing] = useState(false);
            const [date, setDate] = useState(new Date().toLocaleDateString('ko-KR', { 
                month: 'long', day: 'numeric', weekday: 'short' 
            }));

            const [morningActivities, setMorningActivities] = useState([
                { id: Date.now() + 1, text: '오늘 시간표 확인하기', type: 'normal' },
                { id: Date.now() + 2, text: '서랍 속에 교과서 가지런히 정리', type: 'normal' },
                { id: Date.now() + 3, text: '[제출] 희망도서 목록 (도서관)', type: 'urgent' },
                { id: Date.now() + 4, text: '[활동] 조용히 독서하거나 그림그리기', type: 'activity' },
            ]);

            const [schedule, setSchedule] = useState([
                { period: '1교시', subject: '영어', detail: '방과후1실 이동, 교과서, 공책, 필통', color: 'text-rose-500' },
                { period: '2교시', subject: '국어', detail: '시간의 흐름에 따라 글 써보기', color: 'text-slate-800' },
                { period: '3교시', subject: '과학', detail: '빛을 렌즈와 물에 비추는 실험 (50쪽)', color: 'text-slate-800' },
                { period: '4교시', subject: '음악', detail: '음악2실, 음악교과서, 리코더', color: 'text-rose-500' },
                { period: '5교시', subject: '실과', detail: '동물 기르기 영화 시청 (P짱은 내 친구)', color: 'text-slate-800' },
                { period: '점심시간', subject: '', detail: '운동장 사용 금지 (생존수영 기간)', color: 'text-emerald-600' },
                { period: '6교시', subject: '실과', detail: '나만의 동물 사전 만들기 활동', color: 'text-slate-800' },
            ]);

            // 아침 활동 추가
            const addMorningActivity = () => {
                setMorningActivities([...morningActivities, { id: Date.now(), text: '', type: 'normal' }]);
            };

            // 아침 활동 삭제
            const removeMorningActivity = (id) => {
                setMorningActivities(morningActivities.filter(item => item.id !== id));
            };

            const handleMorningActivityChange = (id, newText) => {
                setMorningActivities(prev => prev.map(item => item.id === id ? { ...item, text: newText } : item));
            };

            const handleScheduleChange = (index, field, value) => {
                const newSchedule = [...schedule];
                newSchedule[index][field] = value;
                setSchedule(newSchedule);
            };

            return (
                <div className="min-h-screen flex flex-col p-6 md:p-10 select-none overflow-hidden">
                    {/* 상단 헤더 */}
                    <div className="flex justify-between items-center mb-8 bg-white/60 backdrop-blur-md p-5 rounded-[2rem] border border-white/50 shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="bg-rose-100 p-3 rounded-2xl flex items-center justify-center">
                                <Icon name="calendar" className="text-rose-500 w-7 h-7" />
                            </div>
                            <span className="text-2xl font-extrabold text-slate-700 tracking-tight">{date}</span>
                        </div>
                        
                        <div className="flex gap-3">
                            <button 
                                onClick={() => setIsEditing(!isEditing)}
                                className={`flex items-center gap-2 px-8 py-3 rounded-2xl font-bold text-lg transition-all active:scale-95 ${
                                    isEditing 
                                        ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-200' 
                                        : 'bg-white border-2 border-rose-200 text-rose-500 hover:bg-rose-50'
                                }`}
                            >
                                {isEditing ? <><Icon name="save" className="w-5 h-5" /> 수정 완료</> : <><Icon name="edit-3" className="w-5 h-5" /> 내용 바꾸기</>}
                            </button>
                            
                            {!isEditing && (
                                <div className="flex items-center gap-2 px-5 py-3 bg-slate-100 text-slate-500 rounded-2xl text-sm font-semibold">
                                    <Icon name="lock" className="w-4 h-4" />
                                    화면 보호 중
                                </div>
                            )}
                        </div>
                    </div>

                    {/* 메인 콘텐츠 카드 */}
                    <div className={`flex-1 bg-white rounded-[3rem] shadow-2xl shadow-rose-100 overflow-hidden flex flex-col lg:flex-row relative border-[12px] border-white ${!isEditing ? 'pointer-events-none' : ''}`}>
                        
                        {/* 좌측 세션: 아침 활동 */}
                        <div className="w-full lg:w-[42%] p-10 lg:p-16 bg-gradient-to-br from-rose-50 to-white flex flex-col no-scrollbar overflow-y-auto">
                            <div className="flex items-center gap-3 mb-12">
                                <Icon name="sparkles" className="text-rose-400 w-8 h-8" />
                                <h2 className="text-5xl font-black text-slate-800 tracking-tighter">아침 활동</h2>
                            </div>
                            
                            <div className="space-y-8 flex-1">
                                {morningActivities.map((activity, idx) => (
                                    <div key={activity.id} className="flex gap-5 items-start group">
                                        <div className={`mt-1.5 flex-shrink-0 ${activity.type === 'urgent' ? 'text-rose-500' : 'text-rose-300'}`}>
                                           <Icon name="check-circle-2" className="w-7 h-7" />
                                        </div>
                                        {isEditing ? (
                                            <div className="flex-1 flex gap-2">
                                                <textarea
                                                    value={activity.text}
                                                    placeholder="활동 내용을 입력하세요"
                                                    onChange={(e) => handleMorningActivityChange(activity.id, e.target.value)}
                                                    className="flex-1 p-4 bg-white border-2 border-rose-100 rounded-2xl focus:outline-none focus:border-rose-300 text-xl font-bold text-slate-700 resize-none shadow-sm"
                                                    rows="2"
                                                />
                                                <button 
                                                    onClick={() => removeMorningActivity(activity.id)}
                                                    className="p-2 text-rose-300 hover:text-rose-500 self-center"
                                                >
                                                    <Icon name="trash" className="w-6 h-6" />
                                                </button>
                                            </div>
                                        ) : (
                                            <p className={`text-2xl font-bold leading-relaxed tracking-tight ${
                                                activity.type === 'urgent' ? 'text-rose-600 underline decoration-rose-200 underline-offset-8' : 
                                                activity.type === 'activity' ? 'text-blue-600' : 'text-slate-700'
                                            }`}>
                                                {activity.text}
                                            </p>
                                        )}
                                    </div>
                                ))}
                                
                                {isEditing && (
                                    <button 
                                        onClick={addMorningActivity}
                                        className="w-full py-4 mt-4 border-2 border-dashed border-rose-200 rounded-2xl text-rose-400 font-bold flex items-center justify-center gap-2 hover:bg-rose-50 transition-colors"
                                    >
                                        <Icon name="plus" className="w-6 h-6" />
                                        활동 추가하기
                                    </button>
                                )}
                            </div>
                            {!isEditing && (
                                <div className="mt-8 flex justify-center opacity-30 animate-bounce">
                                    <Icon name="heart" className="text-rose-400 w-16 h-16" />
                                </div>
                            )}
                        </div>

                        {/* 우측 세션: 오늘의 시간표 */}
                        <div className="w-full lg:w-[58%] p-10 lg:p-16 flex flex-col justify-center overflow-y-auto no-scrollbar">
                            <div className="space-y-5">
                                {schedule.map((item, index) => (
                                    <div key={index} className="flex items-center gap-6 p-4 rounded-3xl hover:bg-slate-50 transition-colors">
                                        <div className="min-w-[120px] lg:min-w-[160px]">
                                            {isEditing ? (
                                                <input 
                                                    value={item.period} 
                                                    onChange={(e) => handleScheduleChange(index, 'period', e.target.value)}
                                                    className="text-2xl font-extrabold text-slate-300 w-full p-2 border-b-2 border-slate-100 focus:outline-none focus:border-rose-300 bg-transparent"
                                                />
                                            ) : (
                                                <span className="text-2xl lg:text-3xl font-black text-slate-300 tracking-tighter italic uppercase">{item.period}</span>
                                            )}
                                        </div>

                                        <div className="flex-1 flex flex-col lg:flex-row lg:items-center gap-2 lg:gap-5">
                                            {isEditing ? (
                                                <>
                                                    <input 
                                                        value={item.subject} 
                                                        placeholder="과목명"
                                                        onChange={(e) => handleScheduleChange(index, 'subject', e.target.value)}
                                                        className="text-3xl font-black w-32 p-2 border-b-2 border-slate-100 focus:outline-none focus:border-rose-300"
                                                    />
                                                    <span className="hidden lg:inline text-2xl text-slate-200">|</span>
                                                    <input 
                                                        value={item.detail} 
                                                        placeholder="준비물 및 활동 내용"
                                                        onChange={(e) => handleScheduleChange(index, 'detail', e.target.value)}
                                                        className="text-2xl font-bold w-full p-2 border-b-2 border-slate-100 focus:outline-none focus:border-rose-300 text-slate-500"
                                                    />
                                                </>
                                            ) : (
                                                <>
                                                    {item.subject && (
                                                        <span className={`text-3xl lg:text-4xl font-black tracking-tighter whitespace-nowrap px-4 py-1 rounded-xl ${item.color} ${item.color !== 'text-slate-800' ? 'bg-rose-50' : ''}`}>
                                                            {item.subject}
                                                        </span>
                                                    )}
                                                    <span className={`text-xl lg:text-2xl font-bold leading-tight ${item.color === 'text-slate-800' ? 'text-slate-500' : item.color.replace('text-', 'text-opacity-80 text-')}`}>
                                                        {item.detail}
                                                    </span>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="mt-6 flex justify-center items-center gap-2 text-rose-300 font-bold">
                        <Icon name="sparkles" className="w-5 h-5" />
                        <span>오늘도 행복하고 즐거운 우리 반이 됩시다!</span>
                        <Icon name="sparkles" className="w-5 h-5" />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
