<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 반 아침 알리미</title>
    <!-- React 및 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
        :root { --font-main: 'Pretendard', sans-serif; }
        body { font-family: var(--font-main); letter-spacing: -0.02em; background-color: #FFF5F7; }
        .select-none { user-select: none; -webkit-user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 알림 애니메이션 */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 안정적인 아이콘 컴포넌트
        const Icon = ({ name, className = "" }) => {
            const icons = {
                calendar: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                ),
                save: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                ),
                'edit-3': (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                ),
                lock: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                ),
                sparkles: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"></path>
                        <path d="M5 3v4"></path>
                        <path d="M19 17v4"></path>
                        <path d="M3 5h4"></path>
                        <path d="M17 19h4"></path>
                    </svg>
                ),
                'check-circle-2': (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path>
                        <path d="m9 12 2 2 4-4"></path>
                    </svg>
                ),
                heart: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none" className={className}>
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                ),
                plus: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                ),
                trash: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                ),
                download: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                ),
                upload: (
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                )
            };
            return icons[name] || null;
        };

        const DAYS = ['월', '화', '수', '목', '금'];

        const App = () => {
            const [isEditing, setIsEditing] = useState(false);
            const [selectedDay, setSelectedDay] = useState(DAYS[new Date().getDay() - 1] || '월');
            const [allData, setAllData] = useState({});
            const [isLoaded, setIsLoaded] = useState(false);
            const [toast, setToast] = useState(null);
            const fileInputRef = useRef(null);

            // 데이터 로드
            useEffect(() => {
                const savedData = localStorage.getItem('school_board_v2');
                if (savedData) {
                    setAllData(JSON.parse(savedData));
                } else {
                    const initial = {};
                    DAYS.forEach(day => {
                        initial[day] = {
                            morningActivities: [
                                { id: Date.now() + Math.random(), text: '오늘 시간표 확인하기', type: 'normal' },
                                { id: Date.now() + Math.random(), text: '서랍 속에 교과서 가지런히 정리', type: 'normal' }
                            ],
                            schedule: Array(6).fill(0).map((_, i) => ({
                                period: `${i + 1}교시`, subject: '', detail: '', color: 'text-slate-800'
                            }))
                        };
                    });
                    setAllData(initial);
                }
                setIsLoaded(true);
            }, []);

            // 자동 저장
            useEffect(() => {
                if (isLoaded) {
                    localStorage.setItem('school_board_v2', JSON.stringify(allData));
                }
            }, [allData, isLoaded]);

            // 알림 표시
            const showToast = (message) => {
                setToast(message);
                setTimeout(() => setToast(null), 3000);
            };

            // 데이터 내보내기 (파일 저장)
            const exportData = () => {
                const dataStr = JSON.stringify(allData, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `우리반_알리미_백업_${new Date().toLocaleDateString()}.json`;
                link.click();
                showToast("데이터가 파일로 저장되었습니다!");
            };

            // 데이터 불러오기 (파일 열기)
            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        setAllData(imported);
                        showToast("성공적으로 데이터를 불러왔습니다!");
                    } catch (err) {
                        showToast("올바른 파일 형식이 아닙니다.");
                    }
                };
                reader.readAsText(file);
            };

            if (!isLoaded || !allData[selectedDay]) return null;

            const currentDayData = allData[selectedDay];

            const addMorningActivity = () => {
                const newData = { ...allData };
                newData[selectedDay].morningActivities.push({ id: Date.now(), text: '', type: 'normal' });
                setAllData(newData);
            };

            const removeMorningActivity = (id) => {
                const newData = { ...allData };
                newData[selectedDay].morningActivities = newData[selectedDay].morningActivities.filter(item => item.id !== id);
                setAllData(newData);
            };

            const handleMorningActivityChange = (id, newText) => {
                const newData = { ...allData };
                newData[selectedDay].morningActivities = newData[selectedDay].morningActivities.map(item => item.id === id ? { ...item, text: newText } : item);
                setAllData(newData);
            };

            const handleScheduleChange = (index, field, value) => {
                const newData = { ...allData };
                newData[selectedDay].schedule[index][field] = value;
                setAllData(newData);
            };

            return (
                <div className="min-h-screen flex flex-col p-6 md:p-8 select-none overflow-hidden">
                    {/* 알림 토스트 */}
                    {toast && (
                        <div className="fixed top-8 left-1/2 -translate-x-1/2 z-50 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl font-bold animate-fade-up">
                            {toast}
                        </div>
                    )}

                    {/* 상단 헤더 */}
                    <div className="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4">
                        <div className="flex bg-white/50 backdrop-blur-md p-2 rounded-3xl border border-white/50 shadow-sm">
                            {DAYS.map(day => (
                                <button
                                    key={day}
                                    onClick={() => setSelectedDay(day)}
                                    className={`px-8 py-3 rounded-2xl font-black text-xl transition-all ${
                                        selectedDay === day 
                                            ? 'bg-rose-400 text-white shadow-md scale-105' 
                                            : 'text-rose-200 hover:text-rose-400'
                                    }`}
                                >
                                    {day}
                                </button>
                            ))}
                        </div>

                        <div className="flex gap-3">
                            <input type="file" ref={fileInputRef} onChange={importData} className="hidden" accept=".json" />
                            <button onClick={exportData} title="백업 파일 저장" className="p-3 bg-white border-2 border-rose-100 text-rose-300 rounded-2xl hover:text-rose-500 hover:border-rose-300 transition-all">
                                <Icon name="download" className="w-6 h-6" />
                            </button>
                            <button onClick={() => fileInputRef.current.click()} title="백업 파일 불러오기" className="p-3 bg-white border-2 border-rose-100 text-rose-300 rounded-2xl hover:text-rose-500 hover:border-rose-300 transition-all">
                                <Icon name="upload" className="w-6 h-6" />
                            </button>
                            <button 
                                onClick={() => {
                                    setIsEditing(!isEditing);
                                    if(isEditing) showToast("모든 요일의 정보가 자동 저장되었습니다!");
                                }}
                                className={`flex items-center gap-2 px-8 py-3 rounded-2xl font-bold text-lg transition-all active:scale-95 ${
                                    isEditing 
                                        ? 'bg-emerald-500 text-white shadow-lg' 
                                        : 'bg-white border-2 border-rose-200 text-rose-500 hover:bg-rose-50'
                                }`}
                            >
                                {isEditing ? <><Icon name="save" className="w-5 h-5" /> 수정 완료</> : <><Icon name="edit-3" className="w-5 h-5" /> 내용 바꾸기</>}
                            </button>
                        </div>
                    </div>

                    {/* 메인 보드 */}
                    <div className={`flex-1 bg-white rounded-[3rem] shadow-2xl shadow-rose-100 overflow-hidden flex flex-col lg:flex-row relative border-[12px] border-white ${!isEditing ? 'pointer-events-none' : ''}`}>
                        
                        {/* 왼쪽: 아침 활동 */}
                        <div className="w-full lg:w-[42%] p-8 lg:p-14 bg-gradient-to-br from-rose-50 to-white flex flex-col no-scrollbar overflow-y-auto">
                            <div className="flex items-center gap-3 mb-10">
                                <Icon name="sparkles" className="text-rose-400 w-8 h-8" />
                                <h2 className="text-4xl lg:text-5xl font-black text-slate-800 tracking-tighter italic underline decoration-rose-200 decoration-8 underline-offset-[12px]">{selectedDay}요일 아침</h2>
                            </div>
                            
                            <div className="space-y-6 flex-1">
                                {currentDayData.morningActivities.map((activity, idx) => (
                                    <div key={activity.id} className="flex gap-4 items-start">
                                        <div className="mt-1.5 flex-shrink-0 text-rose-300">
                                           <Icon name="check-circle-2" className="w-7 h-7" />
                                        </div>
                                        {isEditing ? (
                                            <div className="flex-1 flex gap-2">
                                                <textarea
                                                    value={activity.text}
                                                    onChange={(e) => handleMorningActivityChange(activity.id, e.target.value)}
                                                    className="flex-1 p-3 bg-white border-2 border-rose-100 rounded-2xl focus:outline-none focus:border-rose-300 text-lg font-bold text-slate-700 resize-none shadow-sm"
                                                    rows="2"
                                                />
                                                <button onClick={() => removeMorningActivity(activity.id)} className="p-2 text-rose-200 hover:text-rose-500 self-center">
                                                    <Icon name="trash" className="w-5 h-5" />
                                                </button>
                                            </div>
                                        ) : (
                                            <p className="text-2xl font-bold leading-relaxed tracking-tight text-slate-700">
                                                {activity.text}
                                            </p>
                                        )}
                                    </div>
                                ))}
                                {isEditing && (
                                    <button onClick={addMorningActivity} className="w-full py-4 mt-2 border-2 border-dashed border-rose-200 rounded-2xl text-rose-400 font-bold flex items-center justify-center gap-2 hover:bg-rose-50">
                                        <Icon name="plus" className="w-5 h-5" /> 활동 추가
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* 오른쪽: 시간표 */}
                        <div className="w-full lg:w-[58%] p-8 lg:p-14 flex flex-col justify-center overflow-y-auto no-scrollbar">
                            <div className="space-y-4">
                                {currentDayData.schedule.map((item, index) => (
                                    <div key={index} className="flex items-center gap-6 p-4 rounded-3xl hover:bg-slate-50 transition-colors">
                                        <div className="min-w-[100px] lg:min-w-[140px]">
                                            {isEditing ? (
                                                <input value={item.period} onChange={(e) => handleScheduleChange(index, 'period', e.target.value)} className="text-xl font-extrabold text-slate-300 w-full p-1 border-b border-slate-100 focus:outline-none bg-transparent"/>
                                            ) : (
                                                <span className="text-2xl lg:text-3xl font-black text-slate-300 italic uppercase">{item.period}</span>
                                            )}
                                        </div>

                                        <div className="flex-1 flex flex-col lg:flex-row lg:items-center gap-2 lg:gap-4">
                                            {isEditing ? (
                                                <>
                                                    <input value={item.subject} placeholder="과목" onChange={(e) => handleScheduleChange(index, 'subject', e.target.value)} className="text-2xl font-black w-24 p-1 border-b border-slate-100 focus:outline-none"/>
                                                    <input value={item.detail} placeholder="내용/준비물" onChange={(e) => handleScheduleChange(index, 'detail', e.target.value)} className="text-xl font-bold w-full p-1 border-b border-slate-100 focus:outline-none text-slate-500"/>
                                                </>
                                            ) : (
                                                <>
                                                    {item.subject && (
                                                        <span className="text-3xl lg:text-4xl font-black tracking-tighter whitespace-nowrap px-4 py-1 rounded-xl bg-rose-50 text-rose-500">
                                                            {item.subject}
                                                        </span>
                                                    )}
                                                    <span className="text-xl lg:text-2xl font-bold text-slate-500">
                                                        {item.detail}
                                                    </span>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* 하단 배너 */}
                    <div className="mt-4 flex justify-center items-center gap-2 text-rose-300 font-bold text-sm">
                        <Icon name="heart" className="w-4 h-4 animate-pulse" />
                        <span>데이터는 현재 브라우저에만 안전하게 보관됩니다. {new Date().toLocaleDateString('ko-KR', {month: 'long', day: 'numeric'})} 알리미</span>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
