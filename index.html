<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 반 아침 알리미 - 디지털수혈</title>
    <!-- 스타일링을 위한 Tailwind CSS (프레임워크 아님, CSS 도구일 뿐입니다) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
        :root { --font-main: 'Pretendard', sans-serif; }
        body { 
            font-family: var(--font-main); 
            letter-spacing: -0.02em; 
            background-color: #FFF5F7; 
            margin: 0;
            overflow-x: hidden;
        }
        .select-none { user-select: none; -webkit-user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 활성화된 탭 스타일 */
        .active-day-tab { 
            background-color: #fb7185 !important; 
            color: white !important; 
            transform: scale(1.05);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        
        /* 입력창 스타일 */
        .edit-field {
            border: 2px solid #fecdd3;
            border-radius: 0.75rem;
            padding: 0.5rem;
            background: white;
            outline: none;
            width: 100%;
        }
        .edit-field:focus { border-color: #fb7185; }
        
        /* 터치 반응 */
        .btn-push:active { transform: scale(0.95); }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8 select-none relative">

    <!-- 상단 바: 날짜 및 요일 선택 -->
    <div class="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4 bg-white/70 backdrop-blur-md p-5 rounded-[2.5rem] border border-white/50 shadow-sm">
        <div class="flex items-center gap-6">
            <!-- 오늘 날짜 -->
            <div id="date-display" class="flex items-center gap-3 px-6 py-2.5 bg-rose-100 rounded-2xl text-rose-600 font-extrabold shadow-inner text-xl">
                <!-- 날짜가 여기에 표시됨 -->
            </div>
            
            <!-- 요일 탭 -->
            <div class="flex bg-rose-50 p-1.5 rounded-2xl border border-rose-100">
                <button onclick="setDay('월')" class="day-tab px-8 py-2.5 rounded-xl font-black text-xl transition-all text-rose-200 btn-push">월</button>
                <button onclick="setDay('화')" class="day-tab px-8 py-2.5 rounded-xl font-black text-xl transition-all text-rose-200 btn-push">화</button>
                <button onclick="setDay('수')" class="day-tab px-8 py-2.5 rounded-xl font-black text-xl transition-all text-rose-200 btn-push">수</button>
                <button onclick="setDay('목')" class="day-tab px-8 py-2.5 rounded-xl font-black text-xl transition-all text-rose-200 btn-push">목</button>
                <button onclick="setDay('금')" class="day-tab px-8 py-2.5 rounded-xl font-black text-xl transition-all text-rose-200 btn-push">금</button>
            </div>
        </div>
        
        <div class="flex gap-3">
            <button id="edit-btn" onclick="toggleEdit()" class="flex items-center gap-2 px-8 py-3 rounded-2xl font-bold text-lg transition-all bg-white border-2 border-rose-200 text-rose-500 hover:bg-rose-50 btn-push">
                내용 수정
            </button>
            <div id="status-badge" class="flex items-center gap-2 px-5 py-3 bg-slate-100 text-slate-400 rounded-2xl text-sm font-semibold">
                🔒 화면 보호 중
            </div>
        </div>
    </div>

    <!-- 메인 보드 -->
    <div id="main-board" class="flex-1 bg-white rounded-[3.5rem] shadow-2xl shadow-rose-100 overflow-hidden flex flex-col lg:flex-row relative border-[12px] border-white pointer-events-none">
        
        <!-- 좌측: 아침 활동 -->
        <div class="w-full lg:w-[42%] p-10 lg:p-16 bg-gradient-to-br from-rose-50 to-white flex flex-col overflow-y-auto no-scrollbar border-b lg:border-b-0 lg:border-r border-rose-50">
            <div class="flex items-center gap-4 mb-10">
                <span class="text-4xl">✨</span>
                <h2 id="morning-title" class="text-5xl font-black text-slate-800 tracking-tighter italic">
                    <span id="current-day-label" class="text-rose-400">월</span>요일 아침
                </h2>
            </div>
            
            <div id="activity-list" class="space-y-6 flex-1">
                <!-- 활동 항목들이 여기에 들어감 -->
            </div>

            <!-- 추가 버튼 (수정 모드에서만 표시) -->
            <div id="add-btn-area" class="hidden mt-6">
                <button onclick="addNewActivity()" class="w-full py-5 border-2 border-dashed border-rose-200 rounded-3xl text-rose-400 font-bold flex items-center justify-center gap-2 hover:bg-rose-100 transition-colors btn-push">
                    + 새로운 활동 추가
                </button>
            </div>

            <div id="deco-heart" class="mt-10 flex justify-center opacity-20">
                <span class="text-7xl animate-bounce">❤️</span>
            </div>
        </div>

        <!-- 우측: 시간표 -->
        <div class="w-full lg:w-[58%] p-10 lg:p-16 flex flex-col justify-center overflow-y-auto no-scrollbar">
            <div id="schedule-list" class="space-y-6 lg:space-y-8">
                <!-- 시간표가 여기에 들어감 -->
            </div>
        </div>
    </div>

    <!-- 하단 문구 -->
    <div class="mt-6 flex justify-center items-center gap-3 text-rose-300 font-bold text-lg text-center">
        <span>오늘도 행복하고 즐거운 우리 반이 됩시다!</span>
    </div>

    <!-- 워터마크 -->
    <div class="absolute bottom-5 right-10 text-[11px] md:text-sm text-rose-200 font-bold opacity-60 pointer-events-none select-none italic tracking-widest">
        made by 디지털수혈
    </div>

    <!-- 순수 자바스크립트 (프레임워크 없음) -->
    <script>
        // --- 1. 데이터 및 상태 관리 ---
        const DAYS = ['월', '화', '수', '목', '금'];
        let currentDay = '월';
        let isEditing = false;
        let schoolData = {};

        // --- 2. 초기화 함수 ---
        function init() {
            // 오늘 날짜 표시
            const today = new Date();
            const dateStr = today.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
            document.getElementById('date-display').innerText = dateStr;

            // 오늘 요일 자동 선택 (주말이면 월요일)
            const dayIdx = today.getDay();
            currentDay = (dayIdx > 0 && dayIdx < 6) ? DAYS[dayIdx - 1] : '월';

            // 저장된 데이터 불러오기
            const saved = localStorage.getItem('morning_announcement_v5');
            if (saved) {
                schoolData = JSON.parse(saved);
            } else {
                // 초기 기본 데이터 세팅
                DAYS.forEach(day => {
                    schoolData[day] = {
                        activities: [
                            { id: Date.now() + Math.random(), text: '오늘 시간표 확인하기' },
                            { id: Date.now() + Math.random(), text: '서랍 정리하기' }
                        ],
                        schedule: [
                            { period: '1교시', subject: '', detail: '' },
                            { period: '2교시', subject: '', detail: '' },
                            { period: '3교시', subject: '', detail: '' },
                            { period: '4교시', subject: '', detail: '' },
                            { period: '5교시', subject: '', detail: '' },
                            { period: '6교시', subject: '', detail: '' }
                        ]
                    };
                });
            }
            render();
        }

        // --- 3. 렌더링 함수 (화면 그리기) ---
        function render() {
            const data = schoolData[currentDay];
            const board = document.getElementById('main-board');
            const editBtn = document.getElementById('edit-btn');
            const statusBadge = document.getElementById('status-badge');
            const addBtnArea = document.getElementById('add-btn-area');

            // 요일 탭 업데이트
            document.querySelectorAll('.day-tab').forEach(btn => {
                if (btn.innerText === currentDay) btn.classList.add('active-day-tab');
                else btn.classList.remove('active-day-tab');
            });

            // 편집 상태 업데이트
            if (isEditing) {
                editBtn.innerText = '💾 저장 완료';
                editBtn.className = "flex items-center gap-2 px-8 py-3 rounded-2xl font-bold text-lg transition-all bg-emerald-500 text-white shadow-lg btn-push";
                statusBadge.innerText = '📝 내용 수정 중...';
                statusBadge.className = "flex items-center gap-2 px-5 py-3 bg-emerald-50 text-emerald-500 rounded-2xl text-sm font-semibold";
                addBtnArea.classList.remove('hidden');
                board.classList.remove('pointer-events-none');
            } else {
                editBtn.innerText = '내용 수정';
                editBtn.className = "flex items-center gap-2 px-8 py-3 rounded-2xl font-bold text-lg transition-all bg-white border-2 border-rose-200 text-rose-500 hover:bg-rose-50 btn-push";
                statusBadge.innerText = '🔒 화면 보호 중';
                statusBadge.className = "flex items-center gap-2 px-5 py-3 bg-slate-100 text-slate-400 rounded-2xl text-sm font-semibold";
                addBtnArea.classList.add('hidden');
                board.classList.add('pointer-events-none');
            }

            document.getElementById('current-day-label').innerText = currentDay;

            // 아침 활동 목록 그리기
            const activityList = document.getElementById('activity-list');
            activityList.innerHTML = '';
            data.activities.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex gap-4 items-start";
                if (isEditing) {
                    div.innerHTML = `
                        <span class="mt-2 text-2xl text-rose-300">✅</span>
                        <div class="flex-1 flex gap-2">
                            <textarea oninput="updateActivity(${item.id}, this.value)" class="edit-field text-xl font-bold text-slate-700" rows="2">${item.text}</textarea>
                            <button onclick="removeActivity(${item.id})" class="text-rose-300 hover:text-rose-500 text-3xl btn-push">🗑️</button>
                        </div>
                    `;
                } else {
                    div.innerHTML = `
                        <span class="mt-2 text-2xl text-rose-300">✅</span>
                        <p class="text-2xl lg:text-3xl font-bold leading-relaxed tracking-tight text-slate-700 whitespace-pre-wrap">${item.text}</p>
                    `;
                }
                activityList.appendChild(div);
            });

            // 시간표 목록 그리기
            const scheduleList = document.getElementById('schedule-list');
            scheduleList.innerHTML = '';
            data.schedule.forEach((item, idx) => {
                const row = document.createElement('div');
                row.className = "flex items-center gap-6 lg:gap-10 p-2 rounded-3xl hover:bg-rose-50/50 transition-colors";
                if (isEditing) {
                    row.innerHTML = `
                        <div class="min-w-[100px] lg:min-w-[150px]">
                            <input oninput="updateSchedule(${idx}, 'period', this.value)" value="${item.period}" class="edit-field text-2xl font-extrabold text-slate-300 uppercase tracking-tighter" />
                        </div>
                        <div class="flex-1 flex flex-col lg:flex-row lg:items-center gap-2 lg:gap-6">
                            <input oninput="updateSchedule(${idx}, 'subject', this.value)" placeholder="과목" value="${item.subject}" class="edit-field text-3xl font-black w-32" />
                            <input oninput="updateSchedule(${idx}, 'detail', this.value)" placeholder="활동 및 준비물" value="${item.detail}" class="edit-field text-2xl font-bold text-slate-400" />
                        </div>
                    `;
                } else {
                    row.innerHTML = `
                        <div class="min-w-[100px] lg:min-w-[150px]">
                            <span class="text-2xl lg:text-4xl font-black text-slate-200 italic uppercase tracking-tighter leading-none">${item.period}</span>
                        </div>
                        <div class="flex-1 flex flex-col lg:flex-row lg:items-center gap-2 lg:gap-6">
                            ${item.subject ? `<span class="text-3xl lg:text-4xl font-black tracking-tighter whitespace-nowrap px-6 py-2 rounded-2xl bg-rose-50 text-rose-500 shadow-sm border border-rose-100">${item.subject}</span>` : ''}
                            <span class="text-2xl lg:text-3xl font-bold text-slate-500 leading-tight">${item.detail}</span>
                        </div>
                    `;
                }
                scheduleList.appendChild(row);
            });
        }

        // --- 4. 액션 함수들 ---
        function setDay(day) {
            currentDay = day;
            render();
        }

        function toggleEdit() {
            isEditing = !isEditing;
            if (!isEditing) {
                // 저장 시 로컬스토리지 기록
                localStorage.setItem('morning_announcement_v5', JSON.stringify(schoolData));
            }
            render();
        }

        function updateActivity(id, text) {
            const act = schoolData[currentDay].activities.find(a => a.id === id);
            if (act) act.text = text;
        }

        function addNewActivity() {
            schoolData[currentDay].activities.push({ id: Date.now(), text: '' });
            render();
        }

        function removeActivity(id) {
            schoolData[currentDay].activities = schoolData[currentDay].activities.filter(a => a.id !== id);
            render();
        }

        function updateSchedule(idx, field, value) {
            schoolData[currentDay].schedule[idx][field] = value;
        }

        // 시작!
        window.onload = init;
    </script>
</body>
</html>
